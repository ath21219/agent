# agent/docker-compose.yml

services:
  # ─── PostgreSQL + pgvector ───
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: agent-pgvector
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${PG_PASSWORD:-agent_dev}
      POSTGRES_DB: agent_memory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agent -d agent_memory" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Embedding サーバー (Hugging Face TEI) ───
  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:turing-1.9
    container_name: agent-embedding
    command: --model-id cl-nagoya/ruri-v3-310m --port 8080
    ports:
      - "8090:8080"
    volumes:
      - tei-cache:/data
    depends_on:
      pgvector:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

volumes:
  pgdata:
  tei-cache:
